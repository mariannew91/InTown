<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    
    <title>InTown</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="./resources/style.css">
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="./resources/script.js" defer></script>
</head>
<body>
     <!--Header-->
    <header>
        <div id="logo-town">
            <div id="just-logo">
                <a href='./index.html'><img id="logo" src="./resources/images/inTown-logo.png"></a>
            </div>
            <div id="web-name">
                <h1><a href='./index.html'id="title-in">In<span id="town">Town</span></a></h1>
                <p id="get-involved">Go on, get involved</p>
            </div>
            <div id="location">
                <h1>Barrow</h1>
                <!--<h1 class="logout">Find your town
                <h3 class="login">Change location</h3></h1>-->
            </div>
        </div>
        <input type="text" placeholder="Have a look around...">
        <i id="search-symbol" class="fa-solid fa-magnifying-glass"></i>
        <div id="sign-profile">
            <h2 class="logout sign-in">Sign In</h2>
            <h2 class="login sign-in">Profile</h2>
        </div>
    </header>
    <!--Body-->
    <div id="search-page-main">
        <button class="sidebar-tag"><i class="fa-solid fa-sliders"></i></button>
        <div id="search-side-bar" class="profile-side-bar">
            <ul id="search-categories">
                <li class="filter-btn">Type
                    <div class="filter-options">
                        <label><input type="checkbox" name="filter-listing-type" value="type-group"> Regular groups or clubs</label>
                        <label><input type="checkbox" name="filter-listing-type" value="type-event"> Events</label>
                        <label><input type="checkbox" name="filter-listing-type" value="type-course"> Classes or courses</label>
                        <label><input type="checkbox" name="filter-listing-type" value="type-volunteering"> Volunteering</label>
                        <label><input type="checkbox" name="filter-listing-type" value="type-family"> Family & kids activities</label>
                    </div>
                </li>
                <li class="filter-btn">Category
                    <div class="filter-options">
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-arts"> Arts</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-sports"> Sports</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-education"> Education</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-social"> Social</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-health"> Health & Wellbeing</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-food"> Food & Drink</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-music"> Music</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-outdoor"> Outdoors</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-perform"> Performance</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-family"> Family</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-hobby"> Hobby</label>
                        <label><input type="checkbox" name="filter-listing-cat" value="cat-other"> Other</label>
                    </div>
                </li>
                <li class="filter-btn">Price</li>
                <li class="filter-btn">When</li>
                <li class="filter-btn">Age</li>
            </ul>
        </div>
    
        <div id="search-centre">
            <div id="search-top">
                <h1>Find your thing in town</h1>
            </div>
            <div id="search-results">
                <h3> Search Results</h3>
            </div>
        </div>
    </div>
    <!--Footer-->
    <footer>
        <ul>
            <li>About</li>
            <li id="foot-add-listing"><a href='./add-listing.html'>Add a listing</a></li>
            <li>Privacy Policy</li>
        </ul>
    </footer>
</body>
